name: World Cup results

# Daily persist: writes finished scores into worldcup.js for standings/bracket.
# Live scores while viewing the page come from worldcup-live.js (browser poll).

on:
  schedule:
    - cron: "0 7 * * *" # 09:00 Warsaw (CEST) — after overnight matches
  workflow_dispatch: {}

concurrency:
  group: worldcup-results
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch results
        run: npm run results

      - name: Commit & push if changed
        run: |
          if [[ -n "$(git status --porcelain src/_data/worldcup.js)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add src/_data/worldcup.js
            git commit -m "Update World Cup results"
            git push
            echo "Pushed updated results."
          else
            echo "No changes to commit."
          fi
